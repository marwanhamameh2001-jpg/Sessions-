osed with asthma and atopic dermatitis as a child. She does not remember the last time she used her albuterol inhaler, which is prescribed as needed. She applies triamcinolone 0.1% cream to affected skin areas. She drinks 2 beers every weekend.\nShe is 165 cm (5 ft 5 in) tall and weighs 66 kg (145 |b); BMI is 24 kg/m. She is in no apparent distress. Examination shows a soft, nondistended, nontender abdomen. There are small, patchy areas of dry and lichenified skin inside her elbows and at the nape of her neck. A hydrogen breath test is positive. Which of the following is the most likely cause of this patient's diarrhea?","images":[],"tableRows":[{"id":"mwfescr4","label":"Hemoglobin","value":"7.5 g/dL","level":0},{"id":"ntqggqte","label":"Leukocyte count","value":"10,500/mm®","level":0},{"id":"t4yp3u2v","label":"Platelet count","value":"40,000/mm?","level":0},{"id":"x5iknffy","label":"Prothrombin time","value":"15 seconds","level":0},{"id":"ntv6mdb8","label":"Partial thromboplastin time","value":"36 seconds","level":0},{"id":"pa2anczj","label":"Serum","value":"","level":0},{"id":"p10a5zv1","label":"Bilirubin","value":"","level":0},{"id":"rlq96frm","label":"Total","value":"3.5 mg/dL","level":1},{"id":"1hmgz5gj","label":"Direct","value":"0.3 mg/dL","level":0},{"id":"30oftfqg","label":"Urea nitrogen","value":"21 mg/dL","level":0},{"id":"usg1t5o2","label":"Creatinine","value":"1.5 mg/dL","level":0},{"id":"bbsdowxp","label":"Lactate dehydrogenase","value":"1074 U/L","level":0}],"choices":[{"id":"ji6fk5vo","label":"A","text":"Infection with Tropheryma whipplei","explanation":"Infection with Tropheryma whipplei causes Whipple disease, which manifests with diarrhea, abdominal pain, and bloating.\nHowever, symptoms in this condition are not exclusively associated with the consumption of dairy products and, instead, can occur with all types of food. Moreover, patients usually present with cardiac symptoms (e.g., due to valve insufficiency), arthralgia, and neurologic symptoms (e.g., myoclonia, ataxia, impairment of oculomotor function).","isCorrect":false},{"id":"ayul4prr","label":"B","text":"Autoimmune-mediated intolerance to gliadin","explanation":"Autoimmune-mediated intolerance to gliadin causes celiac disease (CD), which also manifests with nonbloody diarrhea, abdominal pain, and bloating. Individuals with CD can have concomitant carbohydrate malabsorption and a positive hydrogen breathing test. Although CD is also a secondary cause of lactase deficiency, gastrointestinal symptoms in patients with CD are usually persistent rather than intermittent and occur with all types of gluten-containing food, not just dairy products.","isCorrect":false},{"id":"xedkbwwn","label":"C","text":"Bacterial overgrowth in the small intestine","explanation":"Small intestine bacterial overgrowth (SIBO) manifests with nonbloody diarrhea, abdominal pain, and bloating. Furthermore, patients with SIBO often have a positive hydrogen breathing test as bacteria metabolize the carbohydrates present in the small intestine. However, symptoms in SIBO are not exclusively associated with the consumption of lactose-containing products but occur with all types of carbohydrates. Moreover, this patient does not have any predisposing conditions for SIBO (e.g., motility disorders, strictures, a surgery causing blind loop syndrome).","isCorrect":false},{"id":"eahglc6r","label":"D","text":"Decreased pancreatic enzyme production","explanation":"Decreased pancreatic enzyme production is caused by exocrine pancreatic insufficiency, which can manifest with nonbloody diarrhea and abdominal bloating. However, these symptoms are not exclusively associated with the consumption of dairy products. Additionally, this patient has no risk factors for pancreatic insufficiency (e.g., history of chronic pancreatitis, gallstones, cystic fibrosis).","isCorrect":false},{"id":"drn3vgs4","label":"E","text":"Loss of intestinal brush border","explanation":"This patient's history of intermittent, c function render(){ saveCanvases(); selected=states[idx].selected; const q=data.questions[idx], st=states[idx]; $('counter').textContent='Question '+(idx+1)+' / '+data.questions.length; $('score').textContent='Score: '+score().correct+' / '+data.questions.length; $('qnum').textContent='Question '+(idx+1); $('qstatus').textContent= st.correctFirst?'Correct':st.lockedWrong?'Incorrect':st.revealed?'Revealed':''; $('qstatus').className='status '+(st.correctFirst?'correct':st.lockedWrong?'wrong':st.revealed?'revealed':''); $('stem').textContent=q.stem; $('tableWrap').innerHTML=tableHTML(q.tableRows||[]); $('imageRow').innerHTML=(q.images||[]).map((im,i)=>'<div class="qimage-card"><img class="qimage" data-img-index="'+i+'" src="'+im.data+'" alt="'+esc(im.name||'image')+'"><div class="qimage-caption">'+esc(im.name||'Tap to view high quality')+'</div></div>').join(''); $('choices').innerHTML=q.choices.map((c,i)=>choiceHTML(c,i,st,q)).join(''); $('nav').innerHTML=data.questions.map((qq,i)=>{const s=states[i]; return '<button class="nav-btn '+(i===idx?'active ':'')+(s.correctFirst?'correct':s.lockedWrong?'wrong':s.revealed?'revealed':'')+'" data-nav="'+i+'"><span>Q'+(i+1)+'</span><b>'+(s.correctFirst?'✓':s.lockedWrong?'×':s.revealed?'!':'')+'</b></button>'}).join(''); document.querySelectorAll('.choice').forEach(el=>el.onclick=()=>choiceClick(+el.dataset.ci)); document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{saveCanvases(); idx=+b.dataset.nav; render();}); document.querySelectorAll('[data-img-index]').forEach(img=>img.onclick=()=>openImage(q.images[+img.dataset.imgIndex])); setTimeout(setupCanvases,80); }
function tableHTML(rows){ if(!rows || !rows.length) return ''; return '<div class="lab-table-wrap"><table class="lab-table"><tbody>'+rows.map(r=>{const label=esc(r.label||''); const value=esc(r.value||''); const lvl=Number.isFinite(+r.level)?Math.max(0,Math.min(2,+r.level)):(r.indent?1:0); if(!value.trim()) return '<tr class="'+(lvl>0?'subsection':'section')+'"><td colspan="2" class="level-'+lvl+'">'+label+'</td></tr>'; return '<tr><td class="level-'+lvl+'">'+label+'</td><td class="value">'+value+'</td></tr>';}).join('')+'</tbody></table></div>'; }

 canvas.onpointerdown=begin; canvas.onpointermove=move; canvas.onpointerup=end; canvas.onpointercancel=end; canvas.onpointerleave=end; }
function initPalette(){ $('palette').innerHTML=colors.map(c=>'<button class="swatch '+(c===color?'active':'')+'" style="background:'+c+'" data-color="'+c+'"></button>').join(''); document.querySelectorAll('[data-color]').forEach(b=>b.onclick=()=>{color=b.dataset.color; $('customColor').value=color; initPalette();}); }
function setToolsHidden(v){ saveCanvases(); const d=$('toolsDetails'); if(d) d.open=!v; setTimeout(setupCanvases,120); }
function openImage(im){ if(!im || annotate) return; $('largeImage').src=im.data; $('imageModalName').textContent=im.name || 'Image'; $('imageModal').classList.add('show'); }
$('answerBtn').onclick=answer; $('showAnswerBtn').onclick=showAnswer; $('prevBtn').onclick=()=>{if(idx>0){saveCanvases();idx--;render();}}; $('nextBtn').onclick=()=>{if(idx<data.questions.length-1){saveCanvases();idx++;render();}}; $('hideTools').onclick=()=>setToolsHidden(true); $('hideToolsTop').onclick=()=>setToolsHidden($('toolsDetails') && $('toolsDetails').open); $('showTools').onclick=()=>setToolsHidden(false); $('toggleAnnotate').onclick=()=>{annotate=!annotate; $('workArea').classList.toggle('annotating',annotate); $('modeHint').textContent=annotate?'Annotate ON':'Annotate OFF';}; document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{tool=b.dataset.tool; document.querySelectorAll('[data-tool]').forEach(x=>x.classList.toggle('active',x===b));}); $('opacityRange').oninput=e=>{opacity=e.target.value/100; $('opacityVal').textContent=e.target.value+'%';}; $('sizeRange').oninput=e=>{size=+e.target.value; $('sizeVal').textContent=e.target.value;}; $('customColor').oninput=e=>{color=e.target.value; initPalette();}; $('clearAnnotation').onclick=()=>{const c=$('annotationCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); states[idx].annotation=null;}; $('clearScratch').onclick=()=>{const c=$('scratchCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); states[idx].scratch=null;}; $('textHighlightBtn').onclick=()=>{ const sel=window.getSelection(); if(!sel || sel.rangeCount===0 || sel.toString().trim()==='') return alert('Select text first while Annotate is OFF.'); const range=sel.getRangeAt(0); const mark=document.createElement('mark'); mark.style.background=rgba(color,opacity); mark.style.borderRadius='4px'; mark.style.padding='0 .08em'; try{range.surroundContents(mark); sel.removeAllRanges();}catch{alert('Try selecting a smaller continuous piece of text.');} };
$('openWhiteboard').onclick=()=>{saveCanvases(); $('wbModal').classList.add('show'); setTimeout(()=>{sizeCanvas($('whiteboardCanvas'), states[idx].whiteboard); attachDraw($('whiteboardCanvas'),'whiteboard');},50)}; $('closeWhiteboard').onclick=()=>{states[idx].whiteboard=$('whiteboardCanvas').toDataURL(); $('wbModal').classList.remove('show');}; $('clearWhiteboard').onclick=()=>{const c=$('whiteboardCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); states[idx].whiteboard=null;}; $('closeImageModal').onclick=()=>{$('imageModal').classList.remove('show'); $('largeImage').src='';}; $('imageModal').onclick=e=>{if(e.target.id==='imageModal') $('closeImageModal').click();}; window.addEventListener('resize',()=>setTimeout(setupCanvases,100)); initPalette(); render();
})();
</script></body></html>
