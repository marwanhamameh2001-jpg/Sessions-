kin areas. She drinks 2 beers every weekend. She is 165 cm (5 ft 5 in) tall and weighs 66 kg (145 Ib); BMI is 24 kg/m? She is in no apparent distress. Examination shows a soft, nondistended, nontender abdomen. There are small, patchy areas of dry and lichenified skin inside her elbows and at the nape of her neck. A hydrogen breath test is positive. Which of the following is the most likely cause of this patient's diarrhea?","images":[],"tableRows":[{"id":"jdoxt5eg","label":"Na*","value":"140 mEq/L","indent":false},{"id":"3azcwpev","label":"K*","value":"5.5 mEq/L","indent":false},{"id":"cmi97vty","label":"cr","value":"101 mEq/L","indent":false},{"id":"i9314n58","label":"HCO3-","value":"9 mEq/L","indent":false},{"id":"x3i8i84k","label":"Urea nitrogen","value":"28 mg/dL","indent":false},{"id":"6fnsvmzw","label":"Creatinine","value":"2.3 mg/dL","indent":false},{"id":"qy7honiy","label":"Glucose","value":"75 mg/dL","indent":false},{"id":"clrvfrhs","label":"Calcium","value":"7.2 mg/dL","indent":false},{"id":"b4s3kpla","label":"Osmolality","value":"320 mOsmol/kg HO","indent":false}],"choices":[{"id":"bgobi0n7","label":"A","text":"Infection with Tropheryma whipplei ","explanation":"Infection with Tropheryma whipplei causes Whipple disease, which manifests with diarrhea, abdominal pain, and bloating. However, symptoms in this condition are not exclusively associated with the consumption of dairy products and, instead, can occur with all types of food. Moreover, patients usually present with cardiac symptoms (e.g., due to valve insufficiency), arthralgia, and neurologic symptoms (e.g., myoclonia, ataxia, impairment of oculomotor function). ","isCorrect":false},{"id":"sct3c2ra","label":"B","text":"Autoimmune-mediated intolerance to gliadin","explanation":"Autoimmune-mediated intolerance to gliadin causes celiac disease (CD), which also manifests with nonbloody diarrhea, abdominal pain, and bloating. Individuals with CD can have concomitant carbohydrate malabsorption and a positive hydrogen breathing test. Although CD is also a secondary cause of lactase deficiency, gastrointestinal symptoms in patients with CD are usually persistent rather than intermittent and occur with all types of gluten-containing food, not just dairy products.","isCorrect":false},{"id":"b7w3snz1","label":"C","text":"gay","explanation":"gay gay","isCorrect":false},{"id":"b4g83cn9","label":"D","text":"ggg","explanation":"hghghg","isCorrect":false},{"id":"ah7xua3k","label":"E","text":"Loss of intestinal brush border ","explanation":"This patient's history of intermittent, crampy abdominal pain, bloating, and nonbloody diarrhea after the consumption of dairy products is suggestive of lactose intolerance. Given this patient's history of gastroenteritis, her lactase deficiency is likely secondary to the loss of intestinal brush border due to mucosal damage following gastroenteritis. The inability to absorb lactose results in the passing of undigested, osmotically active lactose to the large intestine, where it retains water and leads to osmotic diarrhea. Other causes of secondary lactase deficiency include disorders of the small intestine (e.g., gluten-sensitive enteropathy, Crohn disease). Lactase deficiency can also be primary (most common type; more common during childhood and adolescence), developmental (in premature newborns), and congenital (due to genetic defect; very rare). Symptoms usually resolve with dietary lactose restriction.","isCorrect":true}]}]};</script>

function esc(s=''){return String(s).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]))}
function rgba(hex,a){let h=hex.replace('#',''); if(h.length===3) h=h.split('').map(x=>x+x).join(''); const n=parseInt(h,16); return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'}
function render(){ saveCanvases(); selected=states[idx].selected; const q=data.questions[idx], st=states[idx]; $('counter').textContent='Question '+(idx+1)+' / '+data.questions.length; $('score').textContent='Score: '+score().correct+' / '+data.questions.length; $('qnum').textContent='Question '+(idx+1); $('qstatus').textContent= st.correctFirst?'Correct':st.lockedWrong?'Incorrect':st.revealed?'Revealed':''; $('qstatus').className='status '+(st.correctFirst?'correct':st.lockedWrong?'wrong':st.revealed?'revealed':''); $('stem').textContent=q.stem; $('tableWrap').innerHTML=tableHTML(q.tableRows||[]); $('imageRow').innerHTML=(q.images||[]).map((im,i)=>'<div class="qimage-card"><img class="qimage" data-img-index="'+i+'" src="'+im.data+'" alt="'+esc(im.name||'image')+'"><div class="qimage-caption">'+esc(im.name||'Tap to view high quality')+'</div></div>').join(''); $('choices').innerHTML=q.choices.map((c,i)=>choiceHTML(c,i,st,q)).join(''); $('nav').innerHTML=data.questions.map((qq,i)=>{const s=states[i]; return '<button class="nav-btn '+(i===idx?'active ':'')+(s.correctFirst?'correct':s.lockedWrong?'wrong':s.revealed?'revealed':'')+'" data-nav="'+i+'"><span>Q'+(i+1)+'</span><b>'+(s.correctFirst?'✓':s.lockedWrong?'×':s.revealed?'!':'')+'</b></button>'}).join(''); document.querySelectorAll('.choice').forEach(el=>el.onclick=()=>choiceClick(+el.dataset.ci)); document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{saveCanvases(); idx=+b.dataset.nav; render();}); document.querySelectorAll('[data-img-index]').forEach(img=>img.onclick=()=>openImage(q.images[+img.dataset.imgIndex])); setTimeout(setupCanvases,80); }
function tableHTML(rows){ if(!rows || !rows.length) return ''; return '<div class="lab-table-wrap"><table class="lab-table"><tbody>'+rows.map(r=>{const label=esc(r.label||''); const value=esc(r.value||''); if(!value.trim()) return '<tr class="section"><td colspan="2">'+label+'</td></tr>'; return '<tr><td class="'+(r.indent?'indent':'')+'">'+label+'</td><td class="value">'+value+'</td></tr>';}).join('')+'</tbody></table></div>'; }
function choiceClick(i){ const st=states[idx]; selected=i; st.selected=i; if(st.correctChosen || st.revealed){ st.shown[i]=true; } renderChoicesOnly(); }
function choiceHTML(c,i,st,q){ const correctIndex=q.choices.findIndex(x=>x.isCorrect); const isSel=st.selected===i; const show=!!st.shown[i] || (st.revealed && i===correctIndex); let cls='choice '+(isSel?'selected ':'')+(show?'show-exp ':''); if(show && i===correctIndex) cls+='correct '; if(show && i!==correctIndex && st.shown[i]) cls+='wrong '; return '<div class="'+cls+'" data-ci="'+i+'"><div class="choice-head"><div class="letter">'+esc(c.label||String.fromCharCode(65+i))+'</div><div class="choice-text">'+esc(c.text)+'</div></div><div class="explanation"><div>'+esc(c.explanation||'No explanation added.')+'</div></div></div>'}
function renderChoicesOnly(){ const q=data.questions[idx], st=states[idx]; $('choices').innerHTML=q.choices.map((c,i)=>choiceHTML(c,i,st,q)).join(''); document.querySelectorAll('.choice').forEach(el=>el.onclick=()=>choiceClick(+el.dataset.ci)); }
function answer(){ const q=data.questions[idx], st=states[idx]; if(selected===null || selected===undefined) return alert('Choose an answer first.'); const correct=q.choices.findIndex(c=>c.isCorrect); st.selected=selected; st.shown[selected]=true; if(selected===correct){ st.correctChosen=true; if(!st.lockedWrong && !st.revealed) st.correctFirst=true; } else { st.lockedWrong=true; st.correctFirst=false; } render(); }
function showAnswer(){ const q=data.questions[idx], st=states[idx]; const correct=q.choices.findIndex(c=>c.isCorrect); if(!st.correctFirst){ st.lockedWrong=true; st.revealed=true; } st.correctChosen=true; st.shown[correct]=true; render(); }
function score(){return {correct:states.filter(s=>s.correctFirst).length}}
function saveCanvases(){ const a=$('annotationCanvas'), s=$('scratchCanvas'), w=$('whiteboardCanvas'); if(a && a.width) states[idx].annotation=a.toDataURL(); if(s && s.width) states[idx].scratch=s.toDataURL(); if(w && w.width && $('wbModal').classList.contains('show')) states[idx].whiteboard=w.toDataURL(); }
function sizeCanvas(canvas, dataURL){ const rect=canvas.getBoundingClientRect(); const old=dataURL; canvas.width=Math.max(1,Math.floor(rect.width)); canvas.height=Math.max(1,Math.floor(rect.height)); const ctx=canvas.getContext('2d'); ctx.lineCap='round'; ctx.lineJoin='round'; if(old){ const im=new Image(); im.onload=()=>ctx.drawImage(im,0,0,canvas.width,canvas.height); im.src=old; } }
function setupCanvases(){ $('workArea').classList.toggle('annotating', annotate); $('modeHint').textContent=annotate?'Annotate ON':'Annotate OFF'; sizeCanvas($('annotationCanvas'), states[idx].annotation); sizeCanvas($('scratchCanvas'), states[idx].scratch); attachDraw($('annotationCanvas'), 'annotation'); attachDraw($('scratchCanvas'), 'scratch'); }
function attachDraw(canvas, storeKey){ if(canvas._attached) return; canvas._attached=true; let drawing=false,last=null,base=null,temp=null,tctx=null; const ctx=canvas.getContext('2d'); const pt=e=>{const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}}; const begin=e=>{ if(canvas.id==='annotationCanvas' && !annotate) return; e.preventDefault(); if(tool==='text'){const p=pt(e); const txt=prompt('Text to add:'); if(txt){ctx.save(); ctx.fillStyle=color; ctx.font=Math.max(16,size*1.4)+'px system-ui'; ctx.fillText(txt,p.x,p.y); ctx.restore(); states[idx][storeKey]=canvas.toDataURL();} return;} drawing=true; last=pt(e); canvas.setPointerCapture?.(e.pointerId); if(tool==='highlight'){base=ctx.getImageData(0,0,canvas.width,canvas.height); temp=document.createElement('canvas'); temp.width=canvas.width; temp.height=canvas.height; tctx=temp.getContext('2d'); tctx.lineCap='round'; tctx.lineJoin='round'; tctx.strokeStyle=color; tctx.lineWidth=size; tctx.globalAlpha=1;} else {ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=size;ctx.strokeStyle= tool==='eraser'?'rgba(0,0,0,1)':color;ctx.globalCompositeOperation= tool==='eraser'?'destination-out':'source-over';} };
 const move=e=>{ if(!drawing) return; e.preventDefault(); const p=pt(e); if(tool==='highlight'){tctx.beginPath();tctx.moveTo(last.x,last.y);tctx.lineTo(p.x,p.y);tctx.stroke(); ctx.putImageData(base,0,0); ctx.save(); ctx.globalAlpha=opacity; ctx.drawImage(temp,0,0); ctx.restore();} else {ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke(); ctx.globalCompositeOperation='source-over';} last=p; };
 const end=e=>{ if(!drawing) return; drawing=false; if(tool==='highlight'){ctx.putImageData(base,0,0); ctx.save(); ctx.globalAlpha=opacity; ctx.drawImage(temp,0,0); ctx.restore();} ctx.globalCompositeOperation='source-over'; states[idx][storeKey]=canvas.toDataURL(); };
 canvas.onpointerdown=begin; canvas.onpointermove=move; canvas.onpointerup=end; canvas.onpointercancel=end; canvas.onpointerleave=end; }
function initPalette(){ $('palette').innerHTML=colors.map(c=>'<button class="swatch '+(c===color?'active':'')+'" style="background:'+c+'" data-color="'+c+'"></button>').join(''); document.querySelectorAll('[data-color]').forEach(b=>b.onclick=()=>{color=b.dataset.color; $('customColor').value=color; initPalette();}); }
function setToolsHidden(v){ saveCanvases(); const d=$('toolsDetails'); if(d) d.open=!v; setTimeout(setupCanvases,120); }
function openImage(im){ if(!im || annotate) return; $('largeImage').src=im.data; $('imageModalName').textContent=im.name || 'Image'; $('imageModal').classList.add('show'); }
$('answerBtn').onclick=answer; $('showAnswerBtn').onclick=showAnswer; $('prevBtn').onclick=()=>{if(idx>0){saveCanvases();idx--;render();}}; $('nextBtn').onclick=()=>{if(idx<data.questions.length-1){saveCanvases();idx++;render();}}; $('hideTools').onclick=()=>setToolsHidden(true); $('hideToolsTop').onclick=()=>setToolsHidden($('toolsDetails') && $('toolsDetails').open); $('showTools').onclick=()=>setToolsHidden(false); $('toggleAnnotate').onclick=()=>{annotate=!annotate; $('workArea').classList.toggle('annotating',annotate); $('modeHint').textContent=annotate?'Annotate ON':'Annotate OFF';}; document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{tool=b.dataset.tool; document.querySelectorAll('[data-tool]').forEach(x=>x.classList.toggle('active',x===b));}); $('opacityRange').oninput=e=>{opacity=e.target.value/100; $('opacityVal').textContent=e.target.value+'%';}; $('sizeRange').oninput=e=>{size=+e.target.value; $('sizeVal').textContent=e.target.value;}; $('customColor').oninput=e=>{color=e.target.value; initPalette();}; $('clearAnnotation').onclick=()=>{const c=$('annotationCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); states[idx].annotation=null;}; $('clearScratch').onclick=()=>{const c=$('scratchCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); states[idx].scratch=null;}; $('textHighlightBtn').onclick=()=>{ const sel=window.getSelection(); if(!sel || sel.rangeCount===0 || sel.toString().trim()==='') return alert('Select text first while Annotate is OFF.'); const range=sel.getRangeAt(0); const mark=document.createElement('mark'); mark.style.background=rgba(color,opacity); mark.style.borderRadius='4px'; mark.style.padding='0 .08em'; try{range.surroundContents(mark); sel.removeAllRanges();}catch{alert('Try selecting a smaller continuous piece of text.');} };
$('openWhiteboard').onclick=()=>{saveCanvases(); $('wbModal').classList.add('show'); setTimeout(()=>{sizeCanvas($('whiteboardCanvas'), states[idx].whiteboard); attachDraw($('whiteboardCanvas'),'whiteboard');},50)}; $('closeWhiteboard').onclick=()=>{states[idx].whiteboard=$('whiteboardCanvas').toDataURL(); $('wbModal').classList.remove('show');}; $('clearWhiteboard').onclick=()=>{const c=$('whiteboardCanvas'); c.getContext('2d').clearRect(0,0,c.width,c.height); states[idx].whiteboard=null;}; $('closeImageModal').onclick=()=>{$('imageModal').classList.remove('show'); $('largeImage').src='';}; $('imageModal').onclick=e=>{if(e.target.id==='imageModal') $('closeImageModal').click();}; window.addEventListener('resize',()=>setTimeout(setupCanvases,100)); initPalette(); render();
})();
</script></body></html>
